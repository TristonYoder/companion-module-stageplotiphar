name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci
      - run: npm run build
      - run: npx companion-module-check
      - run: npx companion-module-build

      - name: Locate built package
        id: pkg
        run: echo "file=$(ls *.tgz)" >> "$GITHUB_OUTPUT"

      - uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.pkg.outputs.file }}
          generate_release_notes: true
